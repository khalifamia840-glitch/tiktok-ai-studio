services:
  # --- BACKEND (Servicio Web Docker) ---
  # Esta configuración es estándar y nunca fallará en Render
  - type: web
    name: tiktok-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    rootDir: .
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PEXELS_API_KEY
        sync: false
      - key: PIXABAY_API_KEY
        sync: false
      - key: ELEVENLABS_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: PORT
        value: "8000"
      - key: PYTHONUNBUFFERED
        value: "1"

# Nota: Hemos quitado el frontend de aquí para evitar errores de versión de Render.
# El frontend se conecta automáticamente al backend usando la URL que Render te dé.
